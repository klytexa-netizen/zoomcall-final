<!DOCTYPE html>
<html>
<head>
    <title>Zoom Call</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        
        .login-box { max-width: 400px; margin: 0 auto; padding: 30px; background: #f8f9fa; border-radius: 15px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .toggle-btn { background: none !important; color: #667eea !important; margin-top: 10px; }
        .message { text-align: center; padding: 10px; margin-top: 10px; border-radius: 5px; display: none; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        
        .app { display: none; }
        .user-info { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .online-users { background: #f0f2f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .online-users h3 { margin-bottom: 10px; color: #667eea; }
        .user-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .user-card { background: white; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .user-card button { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .user-card button:disabled { background: #ccc; }
        
        .camera-options { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .camera-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .camera-btn.active { background: #28a745; }
        
        .videos { display: flex; gap: 20px; margin: 20px 0; }
        .video-box { flex: 1; position: relative; }
        video { width: 100%; height: 350px; background: black; border-radius: 10px; object-fit: cover; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .controls button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .controls button.danger { background: #dc3545; }
        
        .status { text-align: center; padding: 10px; margin-top: 10px; border-radius: 8px; display: none; }
        .status.active { background: #d4edda; color: #155724; display: block; }
        .status.waiting { background: #fff3cd; color: #856404; display: block; }
        
        .file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Zoom Call</h1>
        
        <!-- Login Section -->
        <div id="loginDiv">
            <div class="login-box">
                <h2 id="authTitle">Login</h2>
                <input type="email" id="email" placeholder="Your Email">
                <input type="password" id="password" placeholder="Password (6+ chars, letters + numbers)">
                <input type="text" id="name" placeholder="Your Name" style="display:none">
                <button onclick="handleAuth()" id="authBtn">Login</button>
                <button onclick="toggleMode()" class="toggle-btn" id="toggleBtn">Create Account</button>
                <div id="authMessage" class="message"></div>
            </div>
        </div>
        
        <!-- Main App -->
        <div id="appDiv" class="app">
            <div class="user-info" id="userInfo"></div>
            
            <div class="camera-options">
                <button class="camera-btn" onclick="useVirtualCamera()" id="virtualCamBtn">🖼️ Upload Photo/Video</button>
            </div>
            
            <div class="online-users"><h3>👥 Online Users</h3><div id="userList">Loading...</div></div>
            <div class="videos">
                <div class="video-box"><div class="video-label">You</div><video id="localVideo" autoplay muted playsinline></video></div>
                <div class="video-box"><div class="video-label">Remote</div><video id="remoteVideo" autoplay playsinline></video></div>
            </div>
            <div class="controls">
                <button onclick="toggleMute()" id="muteBtn">🔇 Mute</button>
                <button onclick="toggleVideo()" id="videoBtn">📹 Stop Video</button>
                <button class="danger" onclick="endCurrentCall()" id="endCallBtn" style="display:none">❌ End Call</button>
                <button class="danger" onclick="leaveCall()">🚪 Leave</button>
            </div>
            <div id="callStatus" class="status"></div>
        </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let localStream = null;
        let peerConnection = null;
        let currentUser = null;
        let currentTargetId = null;
        let inCall = false;
        let isLoginMode = true;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? 'Login' : 'Register';
            document.getElementById('authBtn').textContent = isLoginMode ? 'Login' : 'Register';
            document.getElementById('toggleBtn').textContent = isLoginMode ? 'Create Account' : 'Back to Login';
            document.getElementById('name').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authMessage').style.display = 'none';
        }
        
        function showMessage(msg, type) {
            const d = document.getElementById('authMessage');
            d.textContent = msg;
            d.className = `message ${type}`;
            d.style.display = 'block';
            setTimeout(() => d.style.display = 'none', 3000);
        }
        
        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();
            
            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            const body = isLoginMode ? { email, password } : { email, password, name: name || email.split('@')[0] };
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (isLoginMode) {
                        currentUser = data.user;
                        showMessage('Login successful!', 'success');
                        setTimeout(() => {
                            document.getElementById('loginDiv').style.display = 'none';
                            document.getElementById('appDiv').style.display = 'block';
                            document.getElementById('userInfo').innerHTML = `✅ Logged in as: ${currentUser.name} (${currentUser.email})`;
                            useVirtualCamera();
                            socket.emit('user-join', currentUser);
                        }, 1000);
                    } else {
                        showMessage('Registration successful! Please login.', 'success');
                        setTimeout(() => toggleMode(), 1500);
                    }
                } else {
                    showMessage(data.message, 'error');
                }
            } catch(err) {
                showMessage('Server error', 'error');
            }
        }
        
        // Virtual Camera Only (Upload Photo/Video)
        function useVirtualCamera() {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const url = URL.createObjectURL(file);
                
                if (file.type.startsWith('image/')) {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        
                        function draw() {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            requestAnimationFrame(draw);
                        }
                        draw();
                        
                        const canvasStream = canvas.captureStream(30);
                        
                        navigator.mediaDevices.getUserMedia({ audio: true })
                            .then(audioStream => {
                                localStream = canvasStream;
                                audioStream.getAudioTracks().forEach(track => localStream.addTrack(track));
                                document.getElementById('localVideo').srcObject = localStream;
                                createPeerConnection();
                            })
                            .catch(() => {
                                localStream = canvasStream;
                                document.getElementById('localVideo').srcObject = localStream;
                                createPeerConnection();
                            });
                    };
                    img.src = url;
                } else if (file.type.startsWith('video/')) {
                    const videoElem = document.createElement('video');
                    videoElem.src = url;
                    videoElem.loop = true;
                    videoElem.muted = false;
                    videoElem.playsInline = true;
                    videoElem.autoplay = true;
                    
                    videoElem.onloadeddata = async () => {
                        await videoElem.play();
                        const videoStream = videoElem.captureStream();
                        
                        navigator.mediaDevices.getUserMedia({ audio: true })
                            .then(audioStream => {
                                localStream = videoStream;
                                audioStream.getAudioTracks().forEach(track => localStream.addTrack(track));
                                document.getElementById('localVideo').srcObject = localStream;
                                createPeerConnection();
                            })
                            .catch(() => {
                                localStream = videoStream;
                                document.getElementById('localVideo').srcObject = localStream;
                                createPeerConnection();
                            });
                    };
                }
            };
            fileInput.click();
        }
        
        function createPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentTargetId) {
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        to: currentTargetId
                    });
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    updateCallStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                } else if (peerConnection.connectionState === 'disconnected') {
                    updateCallStatus('Disconnected', 'waiting');
                    resetCallState();
                }
            };
        }
        
        async function startCall(targetId, targetName) {
            if (inCall) {
                alert('Already in a call. End current call first.');
                return;
            }
            
            currentTargetId = targetId;
            updateCallStatus(`Calling ${targetName}...`, 'waiting');
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', {
                    to: targetId,
                    fromName: currentUser.name,
                    offer: offer
                });
            } catch(err) {
                console.error('Error starting call:', err);
                updateCallStatus('Failed to start call', 'waiting');
            }
        }
        
        socket.on('incoming-call', async (data) => {
            currentTargetId = data.from;
            updateCallStatus(`Incoming call from ${data.fromName}...`, 'waiting');
            
            const accept = confirm(`📞 Incoming call from ${data.fromName}. Accept?`);
            
            if (accept) {
                try {
                    await peerConnection.setRemoteDescription(data.offer);
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('answer-call', {
                        to: data.from,
                        answer: answer
                    });
                    updateCallStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                } catch(err) {
                    console.error('Error accepting call:', err);
                    updateCallStatus('Failed to connect', 'waiting');
                }
            } else {
                updateCallStatus('Call rejected', 'waiting');
                setTimeout(() => {
                    const statusDiv = document.getElementById('callStatus');
                    statusDiv.className = 'status';
                    statusDiv.style.display = 'none';
                }, 2000);
            }
        });
        
        socket.on('call-answered', async (data) => {
            try {
                await peerConnection.setRemoteDescription(data.answer);
            } catch(err) {
                console.error('Error setting answer:', err);
            }
        });
        
        socket.on('ice-candidate', async (data) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(data.candidate);
                } catch(err) {
                    console.error('Error adding ICE candidate:', err);
                }
            }
        });
        
        socket.on('call-ended', () => {
            updateCallStatus('Remote user ended the call', 'waiting');
            resetCallState();
        });
        
        socket.on('update-users', (users) => {
            const userListDiv = document.getElementById('userList');
            const otherUsers = users.filter(u => u.socketId !== socket.id);
            
            if (otherUsers.length === 0) {
                userListDiv.innerHTML = '<p>No other users online. Share the link!</p>';
            } else {
                userListDiv.innerHTML = otherUsers.map(user => `
                    <div class="user-card">
                        <span><strong>${escapeHtml(user.name)}</strong><br><small>${escapeHtml(user.email)}</small></span>
                        <button onclick="startCall('${user.socketId}', '${escapeHtml(user.name)}')" ${inCall ? 'disabled' : ''}>
                            ${inCall ? 'In Call' : '📞 Call'}
                        </button>
                    </div>
                `).join('');
            }
        });
        
        function updateCallStatus(message, type) {
            const statusDiv = document.getElementById('callStatus');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
        
        function resetCallState() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            document.getElementById('remoteVideo').srcObject = null;
            currentTargetId = null;
            inCall = false;
            document.getElementById('endCallBtn').style.display = 'none';
            createPeerConnection();
            
            setTimeout(() => {
                const statusDiv = document.getElementById('callStatus');
                statusDiv.className = 'status';
                statusDiv.style.display = 'none';
            }, 2000);
        }
        
        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.getElementById('muteBtn').textContent = audioTrack.enabled ? '🔇 Mute' : '🔊 Unmute';
                }
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('videoBtn').textContent = videoTrack.enabled ? '📹 Stop Video' : '🎥 Start Video';
                }
            }
        }
        
        function endCurrentCall() {
            if (currentTargetId) {
                socket.emit('end-call', { to: currentTargetId });
            }
            resetCallState();
            updateCallStatus('Call ended', 'waiting');
        }
        
        function leaveCall() {
            if (peerConnection) {
                peerConnection.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            location.reload();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
