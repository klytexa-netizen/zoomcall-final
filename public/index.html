<!DOCTYPE html>
<html>
<head>
    <title>Zoom Call</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 20px; }
        
        .login-box { max-width: 350px; margin: 50px auto; padding: 30px; background: #f8f9fa; border-radius: 15px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .error { color: red; margin-top: 10px; display: none; }
        
        .call-area { display: none; }
        .user-info { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .online-section { background: #f0f2f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .online-section h3 { margin-bottom: 10px; color: #667eea; }
        .user-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .user-card { background: white; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .user-card button { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .user-card button:disabled { background: #ccc; cursor: not-allowed; }
        
        .videos { display: flex; gap: 20px; margin: 20px 0; }
        .video-box { flex: 1; position: relative; }
        video { width: 100%; height: 350px; background: black; border-radius: 10px; object-fit: cover; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .controls button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .controls button.danger { background: #dc3545; }
        
        .status { text-align: center; padding: 10px; margin-top: 10px; border-radius: 8px; display: none; }
        .status.active { background: #d4edda; color: #155724; display: block; }
        .status.waiting { background: #fff3cd; color: #856404; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Zoom Call</h1>
        
        <!-- Login Section -->
        <div id="loginSection">
            <div class="login-box">
                <h2>Join Video Call</h2>
                <input type="email" id="email" placeholder="Email" autocomplete="off">
                <input type="password" id="password" placeholder="Password">
                <input type="text" id="name" placeholder="Your Name">
                <button onclick="login()">Join Call</button>
                <div id="loginError" class="error"></div>
            </div>
        </div>
        
        <!-- Call Section -->
        <div id="callSection" class="call-area">
            <div class="user-info" id="userInfo"></div>
            
            <div class="online-section">
                <h3>👥 Online Users</h3>
                <div id="userList">Loading...</div>
            </div>
            
            <div class="videos">
                <div class="video-box">
                    <div class="video-label">You</div>
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
                <div class="video-box">
                    <div class="video-label">Remote</div>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>
            
            <div class="controls">
                <button id="muteBtn" onclick="toggleMute()">🔇 Mute</button>
                <button id="videoBtn" onclick="toggleVideo()">📹 Stop Video</button>
                <button id="endCallBtn" class="danger" onclick="hangUp()" style="display:none">❌ End Call</button>
                <button class="danger" onclick="leaveCall()">🚪 Leave</button>
            </div>
            
            <div id="callStatus" class="status"></div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let localStream = null;
        let peerConnection = null;
        let currentUser = null;
        let currentTargetId = null;
        let currentTargetName = null;
        let inCall = false;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        // Login function
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value || email.split('@')[0];
            
            if (!email || !password) {
                document.getElementById('loginError').innerText = 'Please enter email and password';
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentUser = { email, name: data.name };
                    document.getElementById('userInfo').innerHTML = `✅ Logged in as: ${currentUser.name} (${currentUser.email})`;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('callSection').style.display = 'block';
                    
                    // Initialize camera
                    await initCamera();
                    
                    // Join the call room
                    socket.emit('join', { name: currentUser.name, email: currentUser.email });
                } else {
                    document.getElementById('loginError').innerText = 'Login failed';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch(err) {
                document.getElementById('loginError').innerText = 'Server error';
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                createPeerConnection();
            } catch(err) {
                alert('Camera access denied. Please allow camera and microphone.');
            }
        }
        
        // Create peer connection
        function createPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            // Add local tracks
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            // Handle remote stream
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentTargetId) {
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        targetId: currentTargetId
                    });
                }
            };
            
            // Handle connection state
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    setStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                } else if (peerConnection.connectionState === 'disconnected') {
                    setStatus('Disconnected', 'waiting');
                    resetCall();
                }
            };
        }
        
        // Start a call
        async function startCall(targetId, targetName) {
            if (inCall) {
                alert('Already in a call. End current call first.');
                return;
            }
            
            currentTargetId = targetId;
            currentTargetName = targetName;
            setStatus(`Calling ${targetName}...`, 'waiting');
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('offer', {
                    offer: offer,
                    targetId: targetId,
                    fromName: currentUser.name
                });
            } catch(err) {
                console.error('Error starting call:', err);
                setStatus('Failed to start call', 'waiting');
            }
        }
        
        // Handle incoming offer
        socket.on('offer', async (data) => {
            currentTargetId = data.fromId;
            setStatus(`Incoming call from ${data.fromName}...`, 'waiting');
            
            const accept = confirm(`📞 Incoming video call from ${data.fromName}. Accept?`);
            
            if (accept) {
                try {
                    await peerConnection.setRemoteDescription(data.offer);
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    socket.emit('answer', {
                        answer: answer,
                        targetId: data.fromId
                    });
                    
                    setStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                } catch(err) {
                    console.error('Error accepting call:', err);
                    setStatus('Failed to connect', 'waiting');
                }
            } else {
                setStatus('Call rejected', 'waiting');
                setTimeout(() => {
                    const statusDiv = document.getElementById('callStatus');
                    statusDiv.className = 'status';
                    statusDiv.style.display = 'none';
                }, 2000);
            }
        });
        
        // Handle answer
        socket.on('answer', async (data) => {
            try {
                await peerConnection.setRemoteDescription(data.answer);
            } catch(err) {
                console.error('Error setting answer:', err);
            }
        });
        
        // Handle ICE candidate
        socket.on('ice-candidate', async (data) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(data.candidate);
                } catch(err) {
                    console.error('Error adding ICE candidate:', err);
                }
            }
        });
        
        // Handle hangup
        socket.on('hangup', () => {
            setStatus('Remote user ended the call', 'waiting');
            resetCall();
        });
        
        // Update online users list
        socket.on('online-users', (users) => {
            const userListDiv = document.getElementById('userList');
            const otherUsers = users.filter(u => u.email !== currentUser?.email);
            
            if (otherUsers.length === 0) {
                userListDiv.innerHTML = '<p>No other users online. Share the link!</p>';
            } else {
                userListDiv.innerHTML = otherUsers.map(user => `
                    <div class="user-card">
                        <span><strong>${escapeHtml(user.name)}</strong><br><small>${escapeHtml(user.email)}</small></span>
                        <button onclick="startCall('${user.id}', '${escapeHtml(user.name)}')" ${inCall ? 'disabled' : ''}>
                            ${inCall ? 'In Call' : '📞 Call'}
                        </button>
                    </div>
                `).join('');
            }
        });
        
        // Helper functions
        function setStatus(message, type) {
            const statusDiv = document.getElementById('callStatus');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
        
        function resetCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            document.getElementById('remoteVideo').srcObject = null;
            currentTargetId = null;
            inCall = false;
            document.getElementById('endCallBtn').style.display = 'none';
            createPeerConnection();
            
            setTimeout(() => {
                const statusDiv = document.getElementById('callStatus');
                statusDiv.className = 'status';
                statusDiv.style.display = 'none';
            }, 2000);
        }
        
        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                audioTrack.enabled = !audioTrack.enabled;
                const btn = document.getElementById('muteBtn');
                btn.textContent = audioTrack.enabled ? '🔇 Mute' : '🔊 Unmute';
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                videoTrack.enabled = !videoTrack.enabled;
                const btn = document.getElementById('videoBtn');
                btn.textContent = videoTrack.enabled ? '📹 Stop Video' : '🎥 Start Video';
            }
        }
        
        function hangUp() {
            if (currentTargetId) {
                socket.emit('hangup', { targetId: currentTargetId });
            }
            resetCall();
            setStatus('Call ended', 'waiting');
        }
        
        function leaveCall() {
            if (peerConnection) {
                peerConnection.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            location.reload();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
