<!DOCTYPE html>
<html>
<head>
    <title>Zoom Call</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        
        .login-box { max-width: 400px; margin: 0 auto; padding: 30px; background: #f8f9fa; border-radius: 15px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .toggle-btn { background: none !important; color: #667eea !important; margin-top: 10px; }
        .message { text-align: center; padding: 10px; margin-top: 10px; border-radius: 5px; display: none; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        
        .app { display: none; }
        .user-info { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        
        .camera-setup { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .camera-setup button { background: #28a745; padding: 10px 20px; font-size: 16px; }
        .camera-status { font-size: 14px; margin-top: 10px; }
        
        .online-users { background: #f0f2f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .online-users h3 { margin-bottom: 10px; color: #667eea; }
        .user-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .user-card { background: white; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .user-card button { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .user-card button:disabled { background: #ccc; cursor: not-allowed; }
        
        .host-only { display: none; background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .host-only span { color: #667eea; font-weight: bold; }
        .camera-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .admin-link { background: #333; color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-size: 12px; display: inline-block; }
        
        .videos { display: flex; gap: 20px; margin: 20px 0; }
        .video-box { flex: 1; position: relative; }
        video { width: 100%; height: 350px; background: black; border-radius: 10px; object-fit: cover; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .controls button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .controls button.danger { background: #dc3545; }
        
        .status { text-align: center; padding: 10px; margin-top: 10px; border-radius: 8px; display: none; }
        .status.active { background: #d4edda; color: #155724; display: block; }
        .status.waiting { background: #fff3cd; color: #856404; display: block; }
        
        .file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Zoom Call</h1>
        
        <div id="loginDiv">
            <div class="login-box">
                <h2 id="authTitle">Login</h2>
                <input type="email" id="email" placeholder="Your Email">
                <input type="password" id="password" placeholder="Password (6+ chars, letters + numbers)">
                <input type="text" id="name" placeholder="Your Name" style="display:none">
                <button onclick="handleAuth()" id="authBtn">Login</button>
                <button onclick="toggleMode()" class="toggle-btn" id="toggleBtn">Create Account</button>
                <div id="authMessage" class="message"></div>
            </div>
        </div>
        
        <div id="appDiv" class="app">
            <div class="user-info" id="userInfo"></div>
            
            <!-- Camera Setup Section - Critical for HTTPS -->
            <div id="cameraSetupSection" class="camera-setup">
                <button onclick="setupCamera()">📷 Start My Camera</button>
                <div id="cameraStatus" class="camera-status">⚠️ Please click "Start My Camera" to join the call</div>
            </div>
            
            <div id="hostOnlySection" class="host-only">
                <span>👑 Host Controls</span><br><br>
                <button class="camera-btn" onclick="uploadVirtualCamera()">🖼️ Upload Photo/Video</button>
                <a href="/api/users" target="_blank" class="admin-link">📊 Admin Data</a>
            </div>
            
            <div class="online-users"><h3>👥 Online Users</h3><div id="userList">Loading...</div></div>
            
            <div class="videos">
                <div class="video-box"><div class="video-label">You</div><video id="localVideo" autoplay muted playsinline></video></div>
                <div class="video-box"><div class="video-label">Remote</div><video id="remoteVideo" autoplay playsinline></video></div>
            </div>
            
            <div class="controls">
                <button onclick="toggleMute()" id="muteBtn" disabled>🔇 Mute</button>
                <button onclick="toggleVideo()" id="videoBtn" disabled>📹 Stop Video</button>
                <button onclick="endCall()" id="endCallBtn" style="display:none">❌ End Call</button>
                <button onclick="leaveCall()" class="danger">🚪 Leave</button>
            </div>
            <div id="callStatus" class="status"></div>
        </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let localStream = null;
        let peerConnection = null;
        let currentUser = null;
        let currentTargetId = null;
        let inCall = false;
        let isLoginMode = true;
        let cameraReady = false;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };
        
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? 'Login' : 'Register';
            document.getElementById('authBtn').textContent = isLoginMode ? 'Login' : 'Register';
            document.getElementById('toggleBtn').textContent = isLoginMode ? 'Create Account' : 'Back to Login';
            document.getElementById('name').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authMessage').style.display = 'none';
        }
        
        function showMessage(msg, type) {
            const d = document.getElementById('authMessage');
            d.textContent = msg;
            d.className = `message ${type}`;
            d.style.display = 'block';
            setTimeout(() => d.style.display = 'none', 3000);
        }
        
        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();
            
            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            const body = isLoginMode ? { email, password } : { email, password, name: name || email.split('@')[0] };
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (isLoginMode) {
                        currentUser = data.user;
                        showMessage('Login successful!', 'success');
                        setTimeout(() => {
                            document.getElementById('loginDiv').style.display = 'none';
                            document.getElementById('appDiv').style.display = 'block';
                            document.getElementById('userInfo').innerHTML = `✅ Logged in as: ${currentUser.name} (${currentUser.email})`;
                            socket.emit('user-join', currentUser);
                        }, 1000);
                    } else {
                        showMessage('Registration successful! Please login.', 'success');
                        setTimeout(() => toggleMode(), 1500);
                    }
                } else {
                    showMessage(data.message, 'error');
                }
            } catch(err) {
                showMessage('Server error', 'error');
            }
        }
        
        async function setupCamera() {
            const statusDiv = document.getElementById('cameraStatus');
            statusDiv.innerHTML = '🎥 Requesting camera access...';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                cameraReady = true;
                document.getElementById('cameraSetupSection').style.display = 'none';
                document.getElementById('muteBtn').disabled = false;
                document.getElementById('videoBtn').disabled = false;
                createPeerConnection();
                statusDiv.innerHTML = '✅ Camera ready! You can now make calls.';
                statusDiv.style.color = 'green';
            } catch(e) {
                console.error('Camera error:', e);
                statusDiv.innerHTML = '❌ Camera access denied. Please allow camera permission and try again.';
                statusDiv.style.color = 'red';
                cameraReady = false;
            }
        }
        
        function uploadVirtualCamera() {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const statusDiv = document.getElementById('cameraStatus');
                statusDiv.innerHTML = '🎥 Loading virtual camera...';
                
                const url = URL.createObjectURL(file);
                
                if (file.type.startsWith('image/')) {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        
                        function draw() {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            requestAnimationFrame(draw);
                        }
                        draw();
                        const stream = canvas.captureStream(30);
                        
                        navigator.mediaDevices.getUserMedia({ audio: true })
                            .then(audioStream => {
                                if (localStream) localStream.getTracks().forEach(t => t.stop());
                                localStream = stream;
                                audioStream.getAudioTracks().forEach(t => localStream.addTrack(t));
                                document.getElementById('localVideo').srcObject = localStream;
                                cameraReady = true;
                                document.getElementById('cameraSetupSection').style.display = 'none';
                                document.getElementById('muteBtn').disabled = false;
                                document.getElementById('videoBtn').disabled = false;
                                createPeerConnection();
                                statusDiv.innerHTML = '✅ Virtual camera ready!';
                            })
                            .catch(() => {
                                if (localStream) localStream.getTracks().forEach(t => t.stop());
                                localStream = stream;
                                document.getElementById('localVideo').srcObject = localStream;
                                cameraReady = true;
                                document.getElementById('cameraSetupSection').style.display = 'none';
                                document.getElementById('muteBtn').disabled = false;
                                document.getElementById('videoBtn').disabled = false;
                                createPeerConnection();
                                statusDiv.innerHTML = '✅ Virtual camera ready (no audio)';
                            });
                    };
                    img.src = url;
                } else if (file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.loop = true;
                    video.muted = false;
                    video.playsInline = true;
                    video.autoplay = true;
                    
                    video.onloadeddata = async () => {
                        await video.play();
                        const stream = video.captureStream();
                        
                        navigator.mediaDevices.getUserMedia({ audio: true })
                            .then(audioStream => {
                                if (localStream) localStream.getTracks().forEach(t => t.stop());
                                localStream = stream;
                                audioStream.getAudioTracks().forEach(t => localStream.addTrack(t));
                                document.getElementById('localVideo').srcObject = localStream;
                                cameraReady = true;
                                document.getElementById('cameraSetupSection').style.display = 'none';
                                document.getElementById('muteBtn').disabled = false;
                                document.getElementById('videoBtn').disabled = false;
                                createPeerConnection();
                                statusDiv.innerHTML = '✅ Virtual camera ready!';
                            })
                            .catch(() => {
                                if (localStream) localStream.getTracks().forEach(t => t.stop());
                                localStream = stream;
                                document.getElementById('localVideo').srcObject = localStream;
                                cameraReady = true;
                                document.getElementById('cameraSetupSection').style.display = 'none';
                                document.getElementById('muteBtn').disabled = false;
                                document.getElementById('videoBtn').disabled = false;
                                createPeerConnection();
                                statusDiv.innerHTML = '✅ Virtual camera ready (no audio)';
                            });
                    };
                }
            };
            fileInput.click();
        }
        
        function createPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.ontrack = (event) => {
                console.log('Received remote track');
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentTargetId) {
                    console.log('Sending ICE candidate');
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        targetId: currentTargetId
                    });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE connection state:', peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'connected') {
                    setStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'failed') {
                    setStatus('Connection failed', 'waiting');
                }
            };
        }
        
        async function startCall(targetId, targetName) {
            if (!cameraReady) {
                alert('Please start your camera first by clicking "Start My Camera"');
                return;
            }
            
            if (inCall) {
                alert('Already in a call');
                return;
            }
            
            if (!peerConnection) {
                createPeerConnection();
            }
            
            currentTargetId = targetId;
            setStatus(`Calling ${targetName}...`, 'waiting');
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', {
                    sdp: offer,
                    targetId: targetId,
                    fromName: currentUser.name
                });
                console.log('Offer sent');
            } catch(err) {
                console.error('Error starting call:', err);
                setStatus('Call failed', 'waiting');
            }
        }
        
        socket.on('offer', async (data) => {
            console.log('Offer received from:', data.fromId);
            
            if (!cameraReady) {
                setStatus(`Incoming call from ${data.fromName}... Please start your camera first.`, 'waiting');
                alert(`📞 Call from ${data.fromName}. Please start your camera first.`);
                return;
            }
            
            if (!peerConnection) {
                createPeerConnection();
            }
            
            currentTargetId = data.fromId;
            setStatus(`Incoming call from ${data.fromName}...`, 'waiting');
            
            const accept = confirm(`📞 Call from ${data.fromName}. Accept?`);
            
            if (accept) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('answer', {
                        sdp: answer,
                        targetId: data.fromId
                    });
                    setStatus('Connected!', 'active');
                    inCall = true;
                    document.getElementById('endCallBtn').style.display = 'inline-block';
                    console.log('Answer sent');
                } catch(err) {
                    console.error('Error accepting call:', err);
                    setStatus('Connection failed', 'waiting');
                }
            } else {
                setStatus('Call rejected', 'waiting');
                setTimeout(() => {
                    const d = document.getElementById('callStatus');
                    d.className = 'status';
                    d.style.display = 'none';
                }, 2000);
            }
        });
        
        socket.on('answer', async (data) => {
            console.log('Answer received');
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            } catch(err) {
                console.error('Error setting answer:', err);
            }
        });
        
        socket.on('ice-candidate', async (data) => {
            console.log('ICE candidate received');
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch(err) {
                    console.error('Error adding ICE candidate:', err);
                }
            }
        });
        
        socket.on('end-call', () => {
            setStatus('Remote user ended the call', 'waiting');
            resetCall();
        });
        
        socket.on('update-users', (users) => {
            const listDiv = document.getElementById('userList');
            const others = users.filter(u => u.socketId !== socket.id);
            const myUser = users.find(u => u.socketId === socket.id);
            
            if (myUser && myUser.isHost) {
                document.getElementById('hostOnlySection').style.display = 'block';
            } else {
                document.getElementById('hostOnlySection').style.display = 'none';
            }
            
            if (others.length === 0) {
                listDiv.innerHTML = '<p>No other users online</p>';
            } else {
                listDiv.innerHTML = others.map(u => `
                    <div class="user-card">
                        <span><strong>${escapeHtml(u.name)}</strong><br><small>${escapeHtml(u.email)}</small></span>
                        <button onclick="startCall('${u.socketId}', '${escapeHtml(u.name)}')" ${!cameraReady || inCall ? 'disabled' : ''}>
                            ${inCall ? 'In Call' : '📞 Call'}
                        </button>
                    </div>
                `).join('');
            }
        });
        
        function setStatus(msg, type) {
            const d = document.getElementById('callStatus');
            d.textContent = msg;
            d.className = `status ${type}`;
            d.style.display = 'block';
        }
        
        function resetCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            document.getElementById('remoteVideo').srcObject = null;
            currentTargetId = null;
            inCall = false;
            document.getElementById('endCallBtn').style.display = 'none';
            createPeerConnection();
            setTimeout(() => {
                const d = document.getElementById('callStatus');
                d.className = 'status';
                d.style.display = 'none';
            }, 2000);
        }
        
        function toggleMute() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                if (track) {
                    track.enabled = !track.enabled;
                    document.getElementById('muteBtn').textContent = track.enabled ? '🔇 Mute' : '🔊 Unmute';
                }
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                if (track) {
                    track.enabled = !track.enabled;
                    document.getElementById('videoBtn').textContent = track.enabled ? '📹 Stop Video' : '🎥 Start Video';
                }
            }
        }
        
        function endCall() {
            if (currentTargetId) {
                socket.emit('end-call', { targetId: currentTargetId });
            }
            resetCall();
            setStatus('Call ended', 'waiting');
        }
        
        function leaveCall() {
            if (peerConnection) {
                peerConnection.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
            }
            location.reload();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
    </script>
</body>
</html>
